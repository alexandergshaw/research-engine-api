# Stateless self-host: just the gunicorn app (no database, no Redis).
#   API_KEYS=... USER_AGENT="... (+you@example.com)" docker compose up --build
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      API_KEYS: ${API_KEYS:-}
      USER_AGENT: ${USER_AGENT:-research-engine-api/0.1 (+you@example.com)}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      RATELIMIT_DEFAULT: "120/minute"
