<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Research Engine — Dev Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
    <header class="border-b border-slate-800 bg-slate-900/60 sticky top-0 z-10 backdrop-blur">
      <div class="max-w-6xl mx-auto px-4 py-3">
        <div class="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <h1 class="text-lg font-semibold">Research Engine — Dev Console</h1>
            <p class="text-xs text-slate-400">No-LLM knowledge retrieval · intent → structured JSON</p>
          </div>
          <div class="flex items-end gap-2 flex-wrap">
            <label class="text-xs text-slate-400">
              API base URL
              <input id="baseUrl" placeholder="(same origin)" class="block mt-1 w-56 rounded bg-slate-800 border border-slate-700 px-2 py-1 text-sm" />
            </label>
            <label class="text-xs text-slate-400">
              API key
              <input id="apiKey" type="password" placeholder="X-API-Key (optional)" class="block mt-1 w-56 rounded bg-slate-800 border border-slate-700 px-2 py-1 text-sm" />
            </label>
            <button id="testBtn" class="rounded bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 text-sm font-medium">Save &amp; test</button>
            <span id="status" class="text-xs text-slate-400 self-center">idle</span>
          </div>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-5 grid grid-cols-1 lg:grid-cols-[18rem_1fr] gap-5">
      <aside class="space-y-3">
        <div>
          <h2 class="text-xs uppercase tracking-wide text-slate-400 mb-2">Quick picks</h2>
          <div id="quickPicks" class="flex flex-wrap gap-1.5"></div>
        </div>
        <div>
          <h2 class="text-xs uppercase tracking-wide text-slate-400 mb-2">Intents</h2>
          <div id="intents" class="space-y-1 text-sm">
            <p class="text-slate-500 text-xs">Set the base URL/key and hit “Save &amp; test”.</p>
          </div>
        </div>
      </aside>

      <section class="space-y-4">
        <div class="rounded-lg border border-slate-800 bg-slate-900/40 p-4">
          <div class="flex items-center gap-2 mb-3">
            <label class="text-xs text-slate-400">Intent</label>
            <input id="intent" class="flex-1 rounded bg-slate-800 border border-slate-700 px-2 py-1 text-sm font-mono" placeholder="concept.overview" />
            <button id="runBtn" class="rounded bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 text-sm font-semibold">Run</button>
          </div>
          <p id="intentDesc" class="text-xs text-slate-400 mb-3"></p>
          <div id="params" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <div id="response" class="space-y-3"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
